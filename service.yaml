apiVersion: v1
kind: Service
metadata:
  name: cpu-burner-service
spec:
  selector:
    app: cpu-burner # This tells the Waiter to only talk to the cpu-burner Chefs
  ports:
    - protocol: TCP
      port: 80 # The port the Waiter listens on
      targetPort: 8080 # The port the Chef is listening on
